name: Update Benchmark Data

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 06:00 BKK (UTC+7), Mon–Fri
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas yfinance requests

      - name: Generate benchmark.json
        run: python scripts/generate_benchmark.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/benchmark.json
          git diff --cached --quiet || git commit -m "chore: update benchmark data $(date -u +%Y-%m-%d)"
          git push
